name: DevSecOps CI Pipeline (Build + Scan + Docker Hub)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, auth-service, tasks-service]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & Run tests
        run: |
          cd ${{ matrix.service }}
          npm ci
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "✅ No test script found or skipped for ${{ matrix.service }}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:${{ github.sha }} .

      - name: Scan image with Trivy (DevSecOps security gate)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:${{ github.sha }}
          # Also push latest tag for easy pulling
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:latest