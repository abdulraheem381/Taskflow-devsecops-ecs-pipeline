name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: devsecops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-scan:
    name: Build, Test, Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - auth-service
          - tasks-service

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.service }}

    env:
      LOCAL_IMAGE: taskflow-${{ matrix.service }}:${{ github.sha }}
      REMOTE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:${{ github.sha }}
      REMOTE_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.service }}:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t "$LOCAL_IMAGE" .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        run: |
          docker tag "$LOCAL_IMAGE" "$REMOTE_IMAGE"
          docker tag "$LOCAL_IMAGE" "$REMOTE_IMAGE_LATEST"
          docker push "$REMOTE_IMAGE"
          docker push "$REMOTE_IMAGE_LATEST"
